version: 1
services:
  - type: web
    name: vid-downloader-pro
    env: node
    plan: free
    buildCommand: YOUTUBE_DL_SKIP_DOWNLOAD=true npm install --ignore-scripts --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        generateValue: false # This tells Render to ask for it if missing
      - key: YOUTUBE_DL_SKIP_DOWNLOAD
        value: "true"
      - key: PORT
        value: 10000
