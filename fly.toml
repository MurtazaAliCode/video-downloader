# Fly.io Configuration for Vid Downloader Pro
# Full-stack: React Frontend + Express Backend + FFmpeg + yt-dlp

app = "vid-downloader-pro"
primary_region = "sin"  # Singapore — Pakistan ke sabse kareeb

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false   # Free plan mein bhi on rakhega
  auto_start_machines = true
  min_machines_running = 1     # Hamesha ek machine on

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = "shared-cpu-1x"       # Free plan VM
  memory = "256mb"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  SMTP_HOST = "smtp.gmail.com"
  SMTP_PORT = "465"
  SMTP_USER = "syedmurtazaali756@gmail.com"
  CONTACT_EMAIL = "syedmurtazaali756@gmail.com"

# Secrets (set karo: fly secrets set KEY=VALUE)
# DATABASE_URL = "..."       <- fly secrets set DATABASE_URL="..."
# RAPIDAPI_KEY = "..."       <- fly secrets set RAPIDAPI_KEY="..."
# SMTP_PASS = "..."          <- fly secrets set SMTP_PASS="..."
