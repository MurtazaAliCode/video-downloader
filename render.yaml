services:
  - type: web
    name: vid-downloader-pro
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: video-downloader-db # Change this if you create a database on Render, otherwise provide manually
          property: connectionString
      - key: PORT
        value: 10000
